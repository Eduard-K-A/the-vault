<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Create Business - POSly</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#ffdad6",
                    "outline": "#78767d",
                    "on-surface-variant": "#47464c",
                    "surface": "#f8f9fb",
                    "on-tertiary-container": "#009768",
                    "on-secondary-container": "#fffbff",
                    "surface-container-low": "#f2f4f6",
                    "surface-container-highest": "#e1e2e4",
                    "primary-fixed": "#e2e0fc",
                    "on-error": "#ffffff",
                    "tertiary-container": "#002114",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#45455b",
                    "on-secondary-fixed-variant": "#3323cc",
                    "on-error-container": "#93000a",
                    "secondary": "#4b41e1",
                    "surface-container-high": "#e7e8ea",
                    "secondary-fixed-dim": "#c3c0ff",
                    "on-secondary-fixed": "#0f0069",
                    "inverse-primary": "#c6c4df",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#e2dfff",
                    "inverse-surface": "#2e3132",
                    "on-tertiary-fixed-variant": "#005236",
                    "surface-variant": "#e1e2e4",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#1a1a2e",
                    "inverse-on-surface": "#f0f1f3",
                    "primary": "#00000b",
                    "on-surface": "#191c1e",
                    "surface-dim": "#d9dadc",
                    "on-background": "#191c1e",
                    "tertiary-fixed-dim": "#4edea3",
                    "primary-fixed-dim": "#c6c4df",
                    "surface-bright": "#f8f9fb",
                    "on-tertiary-fixed": "#002113",
                    "tertiary": "#000000",
                    "on-primary-fixed": "#1a1a2e",
                    "surface-container": "#edeef0",
                    "outline-variant": "#c8c5cd",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#83829b",
                    "tertiary-fixed": "#6ffbbe",
                    "background": "#f8f9fb",
                    "surface-tint": "#5d5c74",
                    "secondary-container": "#645efb",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-lg": "24px",
                    "gutter": "12px",
                    "stack-sm": "8px",
                    "padding-v": "16px",
                    "padding-h": "20px",
                    "base": "4px",
                    "stack-md": "16px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "micro": ["Inter"],
                    "headline-sm": ["Inter"],
                    "caption": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "micro": ["11px", {"lineHeight": "16px", "letterSpacing": "0.6px", "fontWeight": "500"}],
                    "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "caption": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                    "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pt-safe">
<!-- TopAppBar (Transactional - Suppress trailing icon) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-padding-h h-14 bg-surface border-b border-outline-variant pt-safe">
<button aria-label="Go back" class="flex-shrink-0 text-secondary p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors duration-200 ease-in-out" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1 text-center">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Create Business</h1>
</div>
<div class="w-10 flex-shrink-0"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-14 pb-[100px] px-padding-h overflow-y-auto">
<div class="max-w-md mx-auto w-full mt-stack-lg flex flex-col gap-stack-lg">
<!-- Logo Upload -->
<section class="flex flex-col gap-stack-sm">
<label class="font-headline-sm text-headline-sm text-on-surface">Business Logo</label>
<button class="w-full h-[80px] rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-1 hover:bg-surface-container-highest transition-colors active:scale-[0.98]" type="button">
<span class="material-symbols-outlined text-outline">photo_camera</span>
<span class="font-caption text-caption text-on-surface-variant">Add logo (optional)</span>
</button>
</section>
<!-- Form Fields -->
<section class="flex flex-col gap-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-headline-sm text-headline-sm text-on-surface" for="businessName">Business Name <span class="text-error">*</span></label>
<div class="relative">
<input class="w-full h-[52px] bg-surface border border-outline-variant rounded-lg px-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="businessName" placeholder="e.g. Acme Retail" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-headline-sm text-headline-sm text-on-surface" for="businessAddress">Business Address</label>
<div class="relative">
<input class="w-full h-[52px] bg-surface border border-outline-variant rounded-lg px-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="businessAddress" placeholder="e.g. 123 Commerce St" type="text"/>
</div>
</div>
</section>
<!-- Info Card -->
<section class="bg-primary-fixed bg-opacity-30 border border-primary-fixed-dim rounded-[12px] p-padding-v mt-stack-sm">
<div class="flex items-center gap-gutter mb-stack-sm">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">info</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">What happens next?</h3>
</div>
<ul class="flex flex-col gap-2 font-body-md text-body-md text-on-surface-variant list-none pl-1">
<li class="flex items-start gap-2">
<span class="material-symbols-outlined text-secondary text-[16px] mt-1">check_circle</span>
                        A join code is generated
                    </li>
<li class="flex items-start gap-2">
<span class="material-symbols-outlined text-secondary text-[16px] mt-1">check_circle</span>
                        Share it with your employees
                    </li>
<li class="flex items-start gap-2">
<span class="material-symbols-outlined text-secondary text-[16px] mt-1">check_circle</span>
                        They join and start selling
                    </li>
</ul>
</section>
</div>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full p-padding-h bg-surface border-t border-outline-variant z-40 pb-safe">
<div class="max-w-md mx-auto w-full">
<button class="w-full h-[52px] bg-secondary text-on-secondary font-headline-sm text-headline-sm rounded-lg hover:bg-secondary-container active:scale-[0.98] transition-all flex items-center justify-center shadow-sm" type="button">
                Create business
            </button>
</div>
</div>
</body></html>
