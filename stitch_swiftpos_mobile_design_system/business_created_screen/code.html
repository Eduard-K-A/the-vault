<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Business Created - POSly</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "outline": "#78767d",
                        "on-surface-variant": "#47464c",
                        "surface": "#f8f9fb",
                        "on-tertiary-container": "#009768",
                        "on-secondary-container": "#fffbff",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-highest": "#e1e2e4",
                        "primary-fixed": "#e2e0fc",
                        "on-error": "#ffffff",
                        "tertiary-container": "#002114",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#45455b",
                        "on-secondary-fixed-variant": "#3323cc",
                        "on-error-container": "#93000a",
                        "secondary": "#4b41e1",
                        "surface-container-high": "#e7e8ea",
                        "secondary-fixed-dim": "#c3c0ff",
                        "on-secondary-fixed": "#0f0069",
                        "inverse-primary": "#c6c4df",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#e2dfff",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface-variant": "#e1e2e4",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1a1a2e",
                        "inverse-on-surface": "#f0f1f3",
                        "primary": "#00000b",
                        "on-surface": "#191c1e",
                        "surface-dim": "#d9dadc",
                        "on-background": "#191c1e",
                        "tertiary-fixed-dim": "#4edea3",
                        "primary-fixed-dim": "#c6c4df",
                        "surface-bright": "#f8f9fb",
                        "on-tertiary-fixed": "#002113",
                        "tertiary": "#000000",
                        "on-primary-fixed": "#1a1a2e",
                        "surface-container": "#edeef0",
                        "outline-variant": "#c8c5cd",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#83829b",
                        "tertiary-fixed": "#6ffbbe",
                        "background": "#f8f9fb",
                        "surface-tint": "#5d5c74",
                        "secondary-container": "#645efb",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "gutter": "12px",
                        "stack-sm": "8px",
                        "padding-v": "16px",
                        "padding-h": "20px",
                        "base": "4px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "micro": ["Inter"],
                        "headline-sm": ["Inter"],
                        "caption": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "micro": ["11px", {"lineHeight": "16px", "letterSpacing": "0.6px", "fontWeight": "500"}],
                        "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "caption": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Utility for 80px circle since arbitrary values are restricted */
        .icon-circle-lg {
            width: 80px;
            height: 80px;
        }
        /* Custom typography for the code to meet the 48px/8px tracking requirement while using theme colors */
        .code-display {
            font-size: 48px;
            line-height: 1;
            font-weight: 700;
            letter-spacing: 8px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col items-center justify-center px-padding-h py-padding-v antialiased">
<!-- Main Content Canvas -->
<main class="w-full max-w-md flex flex-col items-center text-center animate-fade-in-up">
<!-- Success Icon -->
<div class="icon-circle-lg rounded-full bg-secondary text-on-secondary flex items-center justify-center mb-stack-lg shadow-sm">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<!-- Headings -->
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm">
            Your business is ready!
        </h1>
<h2 class="font-headline-md text-headline-md text-secondary mb-stack-lg">
            Acme Coffee Roasters
        </h2>
<!-- Join Code Card -->
<div class="w-full bg-surface border border-outline-variant rounded-xl p-stack-lg shadow-sm flex flex-col items-center relative overflow-hidden">
<!-- Subtle background pattern/texture to elevate from flat -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(var(--tw-colors-outline) 1px, transparent 1px); background-size: 16px 16px;"></div>
<span class="font-micro text-micro text-on-surface-variant uppercase relative z-10">
                EMPLOYEE JOIN CODE
            </span>
<div class="code-display text-primary-container my-stack-md relative z-10">
                A3X9KL
            </div>
<!-- Actions -->
<div class="flex flex-row gap-gutter mt-stack-sm w-full justify-center relative z-10">
<button class="flex-1 flex items-center justify-center gap-2 border border-outline text-on-surface-variant rounded-lg py-2 px-4 font-body-md text-body-md hover:bg-surface-variant transition-colors focus:ring-2 focus:ring-secondary focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">content_copy</span>
                    Copy code
                </button>
<button class="flex-1 flex items-center justify-center gap-2 bg-secondary-container text-on-secondary-container rounded-lg py-2 px-4 font-body-md text-body-md hover:bg-secondary hover:text-on-secondary transition-colors focus:ring-2 focus:ring-secondary focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">ios_share</span>
                    Share with team
                </button>
</div>
</div>
<!-- Info Caption -->
<p class="font-caption text-caption text-on-surface-variant mt-stack-md max-w-[280px]">
            Employees enter this code to join your business. Keep it safe.
        </p>
<!-- Primary Action -->
<div class="w-full mt-stack-lg pt-stack-md">
<button class="w-full h-[52px] bg-secondary text-on-secondary rounded-lg font-headline-sm text-headline-sm flex items-center justify-center gap-2 hover:bg-primary transition-colors focus:ring-4 focus:ring-secondary-fixed-dim focus:outline-none shadow-md" type="button">
                Enter my store
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Lightweight interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const copyBtn = document.querySelector('button:first-of-type');
            if(copyBtn) {
                copyBtn.addEventListener('click', function() {
                    const originalText = this.innerHTML;
                    this.innerHTML = `<span class="material-symbols-outlined text-[20px]">check</span> Copied!`;
                    this.classList.replace('text-on-surface-variant', 'text-on-tertiary-container');
                    this.classList.add('bg-surface-variant');
                    
                    setTimeout(() => {
                        this.innerHTML = originalText;
                        this.classList.replace('text-on-tertiary-container', 'text-on-surface-variant');
                        this.classList.remove('bg-surface-variant');
                    }, 2000);
                });
            }
        });
    </script>
</body></html>
