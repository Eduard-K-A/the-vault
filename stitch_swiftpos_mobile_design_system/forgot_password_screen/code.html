<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - POSly</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#1a1a2e",
                        "on-primary-fixed-variant": "#45455b",
                        "surface-container": "#edeef0",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#5d5c74",
                        "primary-fixed": "#e2e0fc",
                        "on-surface": "#191c1e",
                        "tertiary-container": "#002114",
                        "on-secondary-fixed": "#0f0069",
                        "surface-variant": "#e1e2e4",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#c3c0ff",
                        "surface-container-high": "#e7e8ea",
                        "on-error-container": "#93000a",
                        "surface": "#f8f9fb",
                        "outline-variant": "#c8c5cd",
                        "tertiary-fixed-dim": "#4edea3",
                        "inverse-primary": "#c6c4df",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#009768",
                        "surface-bright": "#f8f9fb",
                        "surface-container-highest": "#e1e2e4",
                        "on-secondary-container": "#fffbff",
                        "secondary-container": "#645efb",
                        "outline": "#78767d",
                        "primary-fixed-dim": "#c6c4df",
                        "on-primary-fixed": "#1a1a2e",
                        "on-tertiary-fixed": "#002113",
                        "secondary": "#4b41e1",
                        "background": "#f8f9fb",
                        "on-tertiary-fixed-variant": "#005236",
                        "secondary-fixed": "#e2dfff",
                        "primary": "#00000b",
                        "tertiary-fixed": "#6ffbbe",
                        "tertiary": "#000000",
                        "on-background": "#191c1e",
                        "on-primary-container": "#83829b",
                        "inverse-surface": "#2e3132",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9dadc",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f2f4f6",
                        "on-surface-variant": "#47464c",
                        "on-secondary-fixed-variant": "#3323cc",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f0f1f3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "stack-sm": "8px",
                        "stack-lg": "24px",
                        "padding-h": "20px",
                        "padding-v": "16px",
                        "stack-md": "16px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter", "sans-serif"],
                        "caption": ["Inter", "sans-serif"],
                        "headline-md": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "micro": ["Inter", "sans-serif"],
                        "headline-sm": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "caption": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["15px", { "lineHeight": "22px", "fontWeight": "400" }],
                        "micro": ["11px", { "lineHeight": "16px", "letterSpacing": "0.6px", "fontWeight": "500" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center">
<!-- Top App Bar (Simplified for transactional intent) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-padding-h h-14 bg-surface dark:bg-surface-dim flat no shadows border-b border-outline-variant dark:border-outline">
<button aria-label="Go back" class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors duration-200 ease-in-out text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex-1"></div>
<!-- Right side empty for balance -->
<div class="w-10"></div>
</header>
<!-- Main Content -->
<main class="w-full max-w-md px-padding-h py-stack-lg mt-14 flex flex-col items-center">
<!-- Icon Container -->
<div class="w-20 h-20 rounded-full bg-secondary-fixed flex items-center justify-center mb-stack-lg shadow-sm border border-outline-variant/30">
<span class="material-symbols-outlined text-[36px] text-secondary" data-icon="lock_reset" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<!-- Typography -->
<h1 class="font-headline-lg text-headline-lg text-center mb-stack-sm text-on-surface">Reset your password</h1>
<p class="font-body-md text-body-md text-center text-on-surface-variant mb-stack-lg max-w-[280px]">
            Enter your email and we'll send a reset link.
        </p>
<!-- Form -->
<form action="#" class="w-full flex flex-col gap-stack-md" method="POST" onsubmit="event.preventDefault(); alert('Reset link sent!');">
<div class="flex flex-col gap-base">
<label class="font-caption text-caption text-on-surface-variant sr-only" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="w-full h-[52px] pl-10 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-outline focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow" id="email" name="email" placeholder="Email address" required="" type="email"/>
</div>
</div>
<button class="w-full h-[52px] bg-secondary text-on-secondary font-headline-sm text-headline-sm rounded-lg flex items-center justify-center shadow-sm hover:bg-secondary/90 active:scale-[0.98] transition-all duration-150" type="submit">
                Send reset link
            </button>
</form>
<!-- Back to Sign In Link -->
<div class="mt-stack-lg">
<a class="font-body-md text-body-md text-secondary hover:text-secondary/80 flex items-center gap-base transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="keyboard_return">keyboard_return</span>
                Back to sign in
            </a>
</div>
</main>
</body></html>
