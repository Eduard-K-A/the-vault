<style>
        /* Custom utilities that Tailwind might not catch immediately or specific behavior overrides */
        .otp-input::-webkit-outer-spin-button,
        .otp-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .otp-input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Error animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-sans antialiased min-h-screen flex flex-col selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- TopAppBar (From JSON) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-padding-h h-14 bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline">
<button aria-label="Go back" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-on-surface-variant dark:text-outline hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors duration-200 ease-in-out" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex-1 flex justify-center items-center">
<span class="font-headline-md text-headline-md text-primary dark:text-on-primary-fixed">POSly</span>
</div>
<button aria-label="Sync" class="w-10 h-10 -mr-2 rounded-full flex items-center justify-center text-on-surface-variant dark:text-outline hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors duration-200 ease-in-out" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">sync</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto pt-[88px] pb-padding-v px-padding-h flex flex-col">
<!-- Header Text -->
<div class="mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm">Join a business</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Ask your owner for the 6-character join code.</p>
</div>
<!-- OTP Input Container -->
<div class="flex flex-col items-center w-full mb-stack-lg">
<div class="flex justify-between w-full max-w-[340px] gap-2 mb-stack-sm" id="otp-container">
<!-- Inputs injected via JS logic to ensure identical structural rendering, but hardcoded here for pure HTML delivery -->
<input aria-label="Digit 1" class="otp-input w-[52px] h-[64px] rounded-lg border-[1.5px] border-outline-variant bg-surface text-center font-headline-lg text-headline-lg text-primary uppercase focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all shadow-sm" maxlength="1" type="text"/>
<input aria-label="Digit 2" class="otp-input w-[52px] h-[64px] rounded-lg border-[1.5px] border-outline-variant bg-surface text-center font-headline-lg text-headline-lg text-primary uppercase focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all shadow-sm" maxlength="1" type="text"/>
<input aria-label="Digit 3" class="otp-input w-[52px] h-[64px] rounded-lg border-[1.5px] border-outline-variant bg-surface text-center font-headline-lg text-headline-lg text-primary uppercase focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all shadow-sm" maxlength="1" type="text"/>
<input aria-label="Digit 4" class="otp-input w-[52px] h-[64px] rounded-lg border-[1.5px] border-outline-variant bg-surface text-center font-headline-lg text-headline-lg text-primary uppercase focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all shadow-sm" maxlength="1" type="text"/>
<input aria-label="Digit 5" class="otp-input w-[52px] h-[64px] rounded-lg border-[1.5px] border-outline-variant bg-surface text-center font-headline-lg text-headline-lg text-primary uppercase focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all shadow-sm" maxlength="1" type="text"/>
<input aria-label="Digit 6" class="otp-input w-[52px] h-[64px] rounded-lg border-[1.5px] border-outline-variant bg-surface text-center font-headline-lg text-headline-lg text-primary uppercase focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all shadow-sm" maxlength="1" type="text"/>
</div>
<!-- Error State Feedback (Hidden by default, shown via JS for demonstration) -->
<div class="h-6 flex items-center justify-center opacity-0 transition-opacity duration-200" id="error-message">
<span class="material-symbols-outlined text-error text-[16px] mr-1" style="font-variation-settings: 'FILL' 1;">error</span>
<span class="font-caption text-caption text-error">Invalid code. Please try again.</span>
</div>
</div>
<!-- Helper Text -->
<p class="font-micro text-micro text-outline text-center mt-stack-md uppercase tracking-wider">
            10 attempts allowed per hour for security
        </p>
<!-- Bottom Action -->
<div class="mt-auto pt-stack-lg w-full">
<button class="w-full h-[52px] rounded-lg font-headline-sm text-headline-sm flex items-center justify-center transition-all duration-200 bg-surface-container-highest text-outline pointer-events-none" disabled="" id="submit-btn">
                Join business
            </button>
</div>
</main>
<!-- Interactive Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const submitBtn = document.getElementById('submit-btn');
            const container = document.getElementById('otp-container');
            const errorMessage = document.getElementById('error-message');

            // Set initial focus
            if (inputs.length > 0) inputs[0].focus();

            const checkFilled = () => {
                const allFilled = Array.from(inputs).every(input => input.value.trim().length === 1);
                if (allFilled) {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('bg-surface-container-highest', 'text-outline', 'pointer-events-none');
                    submitBtn.classList.add('bg-secondary', 'text-on-secondary', 'shadow-md', 'hover:bg-secondary-container', 'hover:text-on-secondary-container');
                } else {
                    submitBtn.disabled = true;
                    submitBtn.classList.add('bg-surface-container-highest', 'text-outline', 'pointer-events-none');
                    submitBtn.classList.remove('bg-secondary', 'text-on-secondary', 'shadow-md', 'hover:bg-secondary-container', 'hover:text-on-secondary-container');
                    
                    // Clear error state if user starts typing again
                    resetErrorState();
                }
            };

            const resetErrorState = () => {
                errorMessage.classList.remove('opacity-100');
                errorMessage.classList.add('opacity-0');
                inputs.forEach(input => {
                    input.classList.remove('border-error', 'text-error', 'focus:border-error', 'focus:ring-error');
                    input.classList.add('border-outline-variant', 'text-primary', 'focus:border-secondary', 'focus:ring-secondary');
                });
            };

            const triggerErrorState = () => {
                container.classList.add('animate-shake');
                errorMessage.classList.remove('opacity-0');
                errorMessage.classList.add('opacity-100');
                
                inputs.forEach(input => {
                    input.classList.remove('border-outline-variant', 'focus:border-secondary', 'focus:ring-secondary');
                    input.classList.add('border-error', 'text-error', 'focus:border-error', 'focus:ring-error');
                });

                setTimeout(() => {
                    container.classList.remove('animate-shake');
                }, 400);
            };

            inputs.forEach((input, index) => {
                // Ensure only alphanumeric, force uppercase
                input.addEventListener('input', (e) => {
                    input.value = input.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                    
                    if (input.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    checkFilled();
                });

                // Handle backspace navigation
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && input.value === '' && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                    }
                });

                // Handle paste
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                    
                    let i = 0;
                    while (i < pastedData.length && index + i < inputs.length) {
                        inputs[index + i].value = pastedData[i];
                        i++;
                    }
                    
                    if (index + i < inputs.length) {
                        inputs[index + i].focus();
                    } else {
                        inputs[inputs.length - 1].focus();
                    }
                    checkFilled();
                });
            });

            // Simulate Form Submission / Error State for demonstration
            submitBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // To demonstrate the requested error state, we always fail on first click in this demo
                triggerErrorState();
            });
        });
    </script>
</body></html>
