bucket_definitions:
  by_business:
    parameters: >
      SELECT business_id
      FROM business_members
      WHERE user_id = token_parameters.user_id
      UNION
      SELECT id AS business_id
      FROM businesses
      WHERE owner_id = token_parameters.user_id
    data:
      - SELECT * FROM products
        WHERE business_id = bucket.business_id
        AND is_active = true
      - SELECT * FROM inventory_items
        WHERE business_id = bucket.business_id
      - SELECT * FROM inventory_logs
        WHERE branch_id IN (
          SELECT id FROM branches WHERE business_id = bucket.business_id
        )
      - SELECT * FROM categories WHERE business_id = bucket.business_id
      - SELECT * FROM branches WHERE business_id = bucket.business_id

  by_employee_sales:
    parameters: >
      SELECT id AS user_id
      FROM profiles
      WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM sales WHERE employee_id = bucket.user_id
      - SELECT * FROM sale_items
        WHERE sale_id IN (
          SELECT id FROM sales WHERE employee_id = bucket.user_id
        )

  by_owner_sales:
    parameters: >
      SELECT business_id
      FROM businesses
      WHERE owner_id = token_parameters.user_id
    data:
      - SELECT * FROM sales WHERE business_id = bucket.business_id
      - SELECT * FROM sale_items
        WHERE sale_id IN (
          SELECT id FROM sales WHERE business_id = bucket.business_id
        )

  by_owner_audit:
    parameters: >
      SELECT business_id
      FROM businesses
      WHERE owner_id = token_parameters.user_id
    data:
      - SELECT * FROM audit_logs WHERE business_id = bucket.business_id
      - SELECT * FROM inventory_logs
        WHERE branch_id IN (
          SELECT id FROM branches WHERE business_id = bucket.business_id
        )
